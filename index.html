<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Newlywed Finance Hub</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: #f9fbf9; color: #2d3436; -webkit-tap-highlight-color: transparent; }
        * { box-sizing: border-box; }
        .btn-primary { background: #4a7c59; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-secondary { background: #d4af37; color: white; border: none; padding: 10px; border-radius: 10px; font-weight: bold; width: 100%; margin-bottom: 15px; }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 100%; font-size: 16px; } /* 16px prevents zoom on iPhone */
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const CATEGORIES = ['Housing', 'Groceries', 'Fun & Entertainment', 'Utilities', 'Savings', 'Income'];
        const COLORS = { primary: '#4a7c59', secondary: '#d4af37', bg: '#f9fbf9', card: '#ffffff', text: '#2d3436', danger: '#e17055' };

        const NewlywedFinanceHub = () => {
            const [transactions, setTransactions] = useState(() => {
                const saved = localStorage.getItem('newlywed_transactions');
                return saved ? JSON.parse(saved) : [];
            });

            const [netWorthItems, setNetWorthItems] = useState(() => {
                const saved = localStorage.getItem('newlywed_networth');
                return saved ? JSON.parse(saved) : [
                    { id: 1, name: 'Savings Account', value: 5000, type: 'asset' },
                    { id: 2, name: 'Student Loan', value: 15000, type: 'liability' }
                ];
            });

            const [activeTab, setActiveTab] = useState('dashboard');

            useEffect(() => { localStorage.setItem('newlywed_transactions', JSON.stringify(transactions)); }, [transactions]);
            useEffect(() => { localStorage.setItem('newlywed_networth', JSON.stringify(netWorthItems)); }, [netWorthItems]);

            const totals = useMemo(() => {
                const assets = netWorthItems.filter(i => i.type === 'asset').reduce((acc, curr) => acc + curr.value, 0);
                const liabilities = netWorthItems.filter(i => i.type === 'liability').reduce((acc, curr) => acc + curr.value, 0);
                const monthlyIncome = transactions.filter(t => t.category === 'Income').reduce((acc, curr) => acc + curr.amount, 0);
                const monthlyExpenses = transactions.filter(t => t.category !== 'Income' && t.category !== 'Savings').reduce((acc, curr) => acc + curr.amount, 0);
                const savingsRate = monthlyIncome > 0 ? ((monthlyIncome - monthlyExpenses) / monthlyIncome * 100).toFixed(1) : 0;
                const burnRate = monthlyIncome > 0 ? ((monthlyExpenses / monthlyIncome) * 100).toFixed(1) : 0;
                return { netWorth: assets - liabilities, assets, liabilities, savingsRate, burnRate, monthlyExpenses };
            }, [netWorthItems, transactions]);

            const addTransaction = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newTx = {
                    id: Date.now(),
                    date: new Date().toLocaleDateString(),
                    description: formData.get('description'),
                    amount: parseFloat(formData.get('amount')),
                    category: formData.get('category'),
                    owner: formData.get('owner')
                };
                setTransactions([newTx, ...transactions]);
                e.target.reset();
            };

            const simulateData = () => {
                const samples = [
                    { id: Date.now() + 1, date: '2023-10-01', description: 'Rent/Mortgage', amount: 2200, category: 'Housing', owner: 'Joint' },
                    { id: Date.now() + 2, date: '2023-10-02', description: 'Groceries', amount: 150, category: 'Groceries', owner: 'Hers' },
                    { id: Date.now() + 3, date: '2023-10-05', description: 'Paycheck', amount: 5000, category: 'Income', owner: 'His' },
                ];
                setTransactions([...samples, ...transactions]);
            };

            const clearData = () => {
                if(confirm("Delete all saved data?")) {
                    setTransactions([]);
                    localStorage.removeItem('newlywed_transactions');
                }
            };

            return (
                <div style={{ minHeight: '100vh', paddingBottom: '80px' }}>
                    <header style={{ padding: '20px', textAlign: 'center', backgroundColor: 'white', borderBottom: '1px solid #eee' }}>
                        <h1 style={{ color: COLORS.primary, margin: 0, fontSize: '1.2rem' }}>💍 Newlywed Finance Hub</h1>
                    </header>

                    <main style={{ maxWidth: '500px', margin: '0 auto', padding: '20px' }}>
                        {activeTab === 'dashboard' ? (
                            <div>
                                <div style={{ background: `linear-gradient(135deg, ${COLORS.primary}, #6b9c78)`, padding: '25px', borderRadius: '20px', color: 'white', marginBottom: '20px' }}>
                                    <p style={{ opacity: 0.9, margin: 0 }}>Net Worth</p>
                                    <h2 style={{ fontSize: '2.5rem', margin: '10px 0' }}>${totals.netWorth.toLocaleString()}</h2>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.8rem' }}>
                                        <span>Assets: ${totals.assets.toLocaleString()}</span>
                                        <span>Debt: ${totals.liabilities.toLocaleString()}</span>
                                    </div>
                                </div>

                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '15px' }}>
                                    <div style={{ background: 'white', padding: '15px', borderRadius: '15px', textAlign: 'center' }}>
                                        <p style={{ margin: 0, fontSize: '0.7rem', color: '#666' }}>Savings Rate</p>
                                        <h3 style={{ color: COLORS.primary, margin: '5px 0' }}>{totals.savingsRate}%</h3>
                                    </div>
                                    <div style={{ background: 'white', padding: '15px', borderRadius: '15px', textAlign: 'center' }}>
                                        <p style={{ margin: 0, fontSize: '0.7rem', color: '#666' }}>Burn Rate</p>
                                        <h3 style={{ color: COLORS.danger, margin: '5px 0' }}>{totals.burnRate}%</h3>
                                    </div>
                                </div>
                                
                                <div style={{ marginTop: '20px', background: '#fff', padding: '15px', borderRadius: '15px' }}>
                                    <h4 style={{ margin: '0 0 10px 0' }}>Coach Tip</h4>
                                    <p style={{ fontSize: '0.9rem', margin: 0 }}>
                                        {totals.savingsRate > 20 ? "🎉 You're killing it! High savings rate this month." : "💡 Try tracking small 'fun' purchases to boost your savings rate."}
                                    </p>
                                </div>
                            </div>
                        ) : (
                            <div>
                                <button onClick={simulateData} className="btn-secondary">🪄 Load Sample Data</button>
                                <form onSubmit={addTransaction} style={{ display: 'flex', flexDirection: 'column', gap: '10px', background: 'white', padding: '15px', borderRadius: '15px' }}>
                                    <input name="description" placeholder="What was it?" required />
                                    <input name="amount" type="number" step="0.01" placeholder="How much? ($)" required />
                                    <select name="category">
                                        {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                    <select name="owner">
                                        <option value="Joint">Joint</option>
                                        <option value="His">His</option>
                                        <option value="Hers">Hers</option>
                                    </select>
                                    <button type="submit" className="btn-primary">Add Entry</button>
                                </form>

                                <div style={{ marginTop: '20px' }}>
                                    {transactions.map(t => (
                                        <div key={t.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '12px', borderBottom: '1px solid #eee', background: 'white', marginBottom: '5px', borderRadius: '8px' }}>
                                            <div>
                                                <div style={{ fontWeight: '600', fontSize: '0.9rem' }}>{t.description}</div>
                                                <div style={{ fontSize: '0.7rem', color: '#888' }}>{t.category} • {t.owner}</div>
                                            </div>
                                            <div style={{ fontWeight: 'bold', color: t.category === 'Income' ? COLORS.primary : COLORS.text }}>
                                                {t.category === 'Income' ? '+' : '-'}${t.amount}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                {transactions.length > 0 && <button onClick={clearData} style={{ marginTop: '20px', background: 'none', border: 'none', color: COLORS.danger, fontSize: '0.8rem', width: '100%' }}>Reset All Data</button>}
                            </div>
                        )}
                    </main>

                    <nav style={{ position: 'fixed', bottom: 0, width: '100%', display: 'flex', justifyContent: 'space-around', backgroundColor: 'white', padding: '15px 0', borderTop: '1px solid #eee', boxShadow: '0 -2px 10px rgba(0,0,0,0.05)' }}>
                        <button onClick={() => setActiveTab('dashboard')} style={{ background: 'none', border: 'none', color: activeTab === 'dashboard' ? COLORS.primary : '#ccc', fontWeight: 'bold' }}>📊 Dash</button>
                        <button onClick={() => setActiveTab('transactions')} style={{ background: 'none', border: 'none', color: activeTab === 'transactions' ? COLORS.primary : '#ccc', fontWeight: 'bold' }}>💸 Log</button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<NewlywedFinanceHub />);
    </script>
</body>
</html>
